name: Bug report / Problem
description: Report a DRH Launcher bug, crash, installation issue, or unexpected behavior.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem with DRH Launcher.
        Please include enough detail to make the issue reproducible.

  - type: input
    id: launcher-version
    attributes:
      label: DRH Launcher version
      description: Which launcher version are you using?
      placeholder: "Example: v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - Windows
        - Linux
        - macOS
        - Other
    validations:
      required: true

  - type: dropdown
    id: package-type
    attributes:
      label: Package type
      options:
        - Windows installer (.exe)
        - Linux AppImage
        - macOS DMG
        - Built from source
    validations:
      required: true

  - type: dropdown
    id: affected-action
    attributes:
      label: Affected action
      description: Pick the closest match.
      options:
        - Install DRH
        - Update DRH
        - Repair DRH
        - Play / launch DRH
        - Launch options
        - Logs / session history
        - Release history
        - Launcher self-update
        - Other
    validations:
      required: true

  - type: dropdown
    id: install-state
    attributes:
      label: Launcher install state
      description: Which status does DRH Launcher show?
      options:
        - Not installed
        - Ready
        - Update available
        - Updating...
        - Running
        - Install incomplete
        - Update status unknown
        - Not visible / unknown
    validations:
      required: false

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem and what you were doing when it happened.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to reproduce
      description: If possible, list the steps that trigger the problem.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant launcher logs if you have them.
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or videos
      description: Drag and drop screenshots or videos here if they help explain the problem.
    validations:
      required: false
