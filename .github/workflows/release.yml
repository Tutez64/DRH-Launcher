name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-22.04
            platform: linux
            upload_pattern: dist/*.AppImage*
          - name: Windows x64
            runner: windows-2022
            platform: windows
            upload_pattern: dist/*.exe*
          - name: macOS universal
            runner: macos-14
            platform: macos
            upload_pattern: |
              dist/*.dmg*
              dist/*.tar.gz*
    uses: ./.github/workflows/package-drhl.yml
    with:
      artifact_name: drhl-${{ matrix.platform }}
      package_name: ${{ matrix.name }}
      platform: ${{ matrix.platform }}
      runner: ${{ matrix.runner }}
      run_clippy: ${{ matrix.platform == 'linux' }}
      run_tests: true
      sign_macos_dmg: true
      sign_update_package: true
      update_public_key: ${{ vars.DRHL_UPDATE_PUBLIC_KEY }}
      upload_pattern: ${{ matrix.upload_pattern }}
      validate_tag: true
    secrets: inherit

  release:
    name: Create draft GitHub release
    needs: package
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: drhl-*
          path: dist
          merge-multiple: true

      - name: Generate update manifest and checksums
        run: |
          python3 scripts/generate-launcher-update-manifest.py \
            --version "$GITHUB_REF_NAME" \
            --repository "$GITHUB_REPOSITORY" \
            --dist-dir dist \
            --output dist/latest.json \
            --checksums-output dist/SHA256SUMS

      - name: Generate release download notes
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from urllib.parse import quote
          import os

          dist = Path("dist")
          repository = os.environ["GITHUB_REPOSITORY"]
          tag = os.environ["GITHUB_REF_NAME"]

          def require_one(pattern: str) -> Path:
              matches = sorted(path for path in dist.glob(pattern) if path.is_file())
              if len(matches) != 1:
                  names = ", ".join(path.name for path in matches) or "none"
                  raise SystemExit(f"Expected one {pattern} file in {dist}, found: {names}")
              return matches[0]

          def github_asset_name(path: Path) -> str:
              return path.name.replace(" ", ".")

          def release_url(path: Path) -> str:
              return f"https://github.com/{repository}/releases/download/{tag}/{quote(github_asset_name(path))}"

          downloads = [
              ("Windows", require_one("*.exe")),
              ("Linux", require_one("*.AppImage")),
              ("macOS", require_one("*.dmg")),
          ]

          lines = [
              "# Download DRH Launcher",
              "",
              "Choose the file for your operating system:",
              "",
          ]
          for label, path in downloads:
              lines.append(f"- **{label}:** [{path.name}]({release_url(path)})")
          lines.extend([
              "",
              "**Need help installing? [Read the installation instructions](https://github.com/Tutez64/DRH-Launcher#readme).**",
              "",
              "## Changelog",
              "",
          ])

          Path(os.environ["RUNNER_TEMP"], "release-downloads.md").write_text(
              "\n".join(lines),
              encoding="utf-8",
          )
          PY

      - name: Create draft release
        shell: bash
        run: |
          prerelease=()
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            prerelease=(--prerelease)
          fi
          release_notes="$(cat "$RUNNER_TEMP/release-downloads.md")"

          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --verify-tag \
            --title "DRH Launcher $GITHUB_REF_NAME" \
            --generate-notes \
            --notes "$release_notes" \
            "${prerelease[@]}" \
            dist/*
