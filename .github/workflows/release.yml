name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-22.04
            platform: linux
            upload_pattern: dist/*.AppImage*
          - name: Windows x64
            runner: windows-2022
            platform: windows
            upload_pattern: dist/*.exe*
          - name: macOS universal
            runner: macos-14
            platform: macos
            upload_pattern: |
              dist/*.dmg*
              dist/*.tar.gz*
    uses: ./.github/workflows/package-drhl.yml
    with:
      artifact_name: drhl-${{ matrix.platform }}
      package_name: ${{ matrix.name }}
      platform: ${{ matrix.platform }}
      runner: ${{ matrix.runner }}
      run_clippy: ${{ matrix.platform == 'linux' }}
      run_tests: true
      sign_macos_dmg: true
      sign_update_package: true
      update_public_key: ${{ vars.DRHL_UPDATE_PUBLIC_KEY }}
      upload_pattern: ${{ matrix.upload_pattern }}
      validate_tag: true
    secrets: inherit

  release:
    name: Create draft GitHub release
    needs: package
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: drhl-*
          path: dist
          merge-multiple: true

      - name: Generate update manifest and checksums
        run: |
          python3 scripts/generate-launcher-update-manifest.py \
            --version "$GITHUB_REF_NAME" \
            --repository "$GITHUB_REPOSITORY" \
            --dist-dir dist \
            --output dist/latest.json \
            --checksums-output dist/SHA256SUMS

      - name: Create draft release
        shell: bash
        run: |
          prerelease=()
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            prerelease=(--prerelease)
          fi

          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --verify-tag \
            --title "DRH Launcher $GITHUB_REF_NAME" \
            --generate-notes \
            "${prerelease[@]}" \
            dist/*
